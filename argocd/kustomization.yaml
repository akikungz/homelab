apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd
resources:
- https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
- argocd-self-managed.yaml

configMapGenerator:
  - name: env-config
    envs:
      - .env.config

replacements:
  - source:
      kind: ConfigMap
      name: env-config
      fieldPath: data.GIT_REPO_URL
    targets:
      - select:
          kind: Application
          name: argocd
        fieldPaths:
          - spec.source.repoURL

  - source:
      kind: ConfigMap
      name: env-config
      fieldPath: data.GIT_TARGET_REVISION
    targets:
      - select:
          kind: Application
          name: argocd
        fieldPaths:
          - spec.source.targetRevision

  - source:
      kind: ConfigMap
      name: env-config
      fieldPath: data.APP_PATH
    targets:
      - select:
          kind: Application
          name: argocd
        fieldPaths:
          - spec.source.path

  - source:
      kind: ConfigMap
      name: env-config
      fieldPath: data.APP_NAMESPACE
    targets:
      - select:
          kind: Application
          name: argocd
        fieldPaths:
          - spec.destination.namespace

generatorOptions:
  disableNameSuffixHash: true
