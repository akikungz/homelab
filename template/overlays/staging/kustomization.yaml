apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: staging

configMapGenerator:
  - name: template-app-config
    envs:
      - .env.config

secretGenerator:
  - name: template-app-secret
    envs:
      - .env.secret

# Adjust resources and replicas for staging env
patches:
  - target:
      kind: Deployment
      name: template-app
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: template-app
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: app
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 200m
                    memory: 256Mi
