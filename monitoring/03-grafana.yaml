apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-csi
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      initContainers:
        - name: wait-for-lgtm-backends
          image: curlimages/curl:8.8.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              until curl -fsS http://loki:3100/ready; do echo "waiting for loki"; sleep 5; done
              until curl -fsS http://tempo:3200/ready; do echo "waiting for tempo"; sleep 5; done
              until curl -fsS http://mimir:9009/ready; do echo "waiting for mimir"; sleep 5; done
        - name: bootstrap-grafana-provisioning
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/lib/grafana/provisioning/datasources
              mkdir -p /var/lib/grafana/provisioning/dashboards
              if [ ! -f /var/lib/grafana/provisioning/datasources/datasources.yaml ]; then
                cp /seed/datasources/datasources.yaml /var/lib/grafana/provisioning/datasources/datasources.yaml
              fi
              if [ ! -f /var/lib/grafana/provisioning/dashboards/dashboards.yaml ]; then
                cp /seed/dashboard-provider/dashboards.yaml /var/lib/grafana/provisioning/dashboards/dashboards.yaml
              fi
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /seed/datasources
            - name: grafana-dashboard-provider
              mountPath: /seed/dashboard-provider
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: monitoring-env
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitoring-env
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-storage
              mountPath: /etc/grafana/provisioning/datasources
              subPath: provisioning/datasources
            - name: grafana-storage
              mountPath: /etc/grafana/provisioning/dashboards
              subPath: provisioning/dashboards
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
