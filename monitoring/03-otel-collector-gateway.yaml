apiVersion: v1
kind: Service
metadata:
  name: otel-collector-gateway
  namespace: monitoring
  labels:
    app: otel-collector-gateway
spec:
  type: ClusterIP
  selector:
    app: otel-collector-gateway
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: health
      port: 13133
      targetPort: 13133

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector-gateway
  namespace: monitoring
  labels:
    app: otel-collector-gateway

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-gateway
  labels:
    app: otel-collector-gateway
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-gateway
  labels:
    app: otel-collector-gateway
subjects:
  - kind: ServiceAccount
    name: otel-collector-gateway
    namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-gateway

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector-gateway
  namespace: monitoring
  labels:
    app: otel-collector-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector-gateway
  template:
    metadata:
      labels:
        app: otel-collector-gateway
    spec:
      serviceAccountName: otel-collector-gateway
      initContainers:
        - name: wait-for-lgtm-backends
          image: curlimages/curl:8.8.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              until curl -fsS http://loki:3100/ready; do echo "waiting for loki"; sleep 5; done
              until curl -fsS http://tempo:3200/ready; do echo "waiting for tempo"; sleep 5; done
              until curl -fsS http://mimir:9009/ready; do echo "waiting for mimir"; sleep 5; done
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.106.1
          imagePullPolicy: IfNotPresent
          env:
            - name: OTEL_HTTP_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: monitoring-env
                  key: OTEL_HTTP_BEARER_TOKEN
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          args:
            - --config=/etc/otelcol-contrib/otel-collector-config.yaml
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 13133
              name: health
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otelcol-contrib
      volumes:
        - name: otel-config
          configMap:
            name: otel-collector-gateway-config
